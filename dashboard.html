<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin - RpleNotViol</title>
    <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Gochi Hand', cursive; background: #f0f0f0; padding: 20px; }
        .dashboard-container { 
            max-width: 800px; margin: 50px auto; background: white; 
            padding: 30px; border: 4px solid #2D3436; border-radius: 20px;
            box-shadow: 10px 10px 0px #BAE6FD;
        }
        .stats { display: flex; gap: 20px; margin-top: 20px; }
        .stat-box { flex: 1; padding: 20px; border: 3px solid #2D3436; border-radius: 10px; text-align: center; }
        button { background: #FECACA; padding: 10px 20px; border: 3px solid #2D3436; border-radius: 10px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <script>
        // PROTEKSI HALAMAN: Jika belum login, tendang balik ke login.html
        if (localStorage.getItem("status") !== "logged_in") {
            window.location.href = "login.html";
        }
    </script>

    <div class="dashboard-container">
        <h1>Halo Admin RpleNotViol! 👑</h1>
        <p>Ini adalah halaman rahasia untuk mengelola donasi dan konten.</p>
        
        <div class="stats">
            <div class="stat-box" style="background: #FEF08A;">
                <h3>Total Donasi</h3>
                <p>Rp 1.250.000</p>
            </div>
            <div class="stat-box" style="background: #BBF7D0;">
                <h3>Merch Terjual</h3>
                <p>42 Item</p>
            </div>
        </div>

        <button onclick="logout()">Keluar (Logout)</button>
    </div>

    <script>
        function logout() {
            localStorage.clear(); // Hapus data login
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
