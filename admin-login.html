<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - RpleNotViol</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend&family=Gochi+Hand&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lexend', sans-serif; background: #E9D5FF; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border: 4px solid #333; box-shadow: 10px 10px 0px #FEF08A; border-radius: 20px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 2px solid #333; border-radius: 8px; font-family: 'Lexend'; }
        button { background: #BBF7D0; border: 2px solid #333; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 8px; box-shadow: 4px 4px 0px #333; }
        button:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #333; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="font-family: 'Gochi Hand'; font-size: 2rem;">Admin RpleNotViol</h2>
        <input type="password" id="pass" placeholder="Masukkan Password Rahasia">
        <br>
        <button onclick="checkPass()">Masuk ke Dashboard</button>
    </div>

    <script>
        function checkPass() {
            var password = document.getElementById("pass").value;
            // Ganti 'rple123' dengan password yang kamu mau
            if (password === "rple123") {
                window.location.href = "dashboard-admin.html";
            } else {
                alert("Password Salah! Akses Ditolak.");
            }
        }
    </script>
</body>
</html>
